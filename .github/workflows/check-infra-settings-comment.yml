name: Post Infra Settings Comment

on:
  workflow_run:
    workflows: ["Check Infra Settings"]
    types:
      - completed

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: infra-settings-check
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true
        id: download

      - name: Post or update PR comment
        if: steps.download.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('infra_settings_check.txt') || !fs.existsSync('pr_number.txt')) {
              console.log('No infra-settings check results found');
              return;
            }

            const body = fs.readFileSync('infra_settings_check.txt', 'utf8');
            const prNumber = parseInt(fs.readFileSync('pr_number.txt', 'utf8').trim(), 10);
            const marker = '<!-- ce-infra-settings-check -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
