# Default settings for Tenstorrent SFPI C++
#
# These defaults assume sibling checkouts next to compiler-explorer:
#   ../sfpi
#   ../tt-metal
#
# Override paths or add extra compiler entries in sfpi.local.properties if your
# toolchain lives elsewhere.

compilers=sfpi
defaultCompiler=sfpi
compilerType=sfpi
supportsBinary=false
supportsExecute=false
demangler=c++filt
objdumper=objdump

compiler.sfpi.name=SFPI Compiler (riscv-tt-elf-g++)
compiler.sfpi.exe=riscv-tt-elf-g++
compiler.sfpi.alias=sfpi
compiler.sfpi.instructionSet=riscv64
compiler.sfpi.versionFlag=--version
