# Default settings for TT-Metalium
compilers=&tt_metal
defaultCompiler=tt_metal_latest
compilerType=tt-metal
supportsBinary=false
supportsExecute=false
isSemVer=true
notification=Experimental TT-Metalium support on Compiler Explorer. This uses Tenstorrent's custom LLVM fork targeting RISC-V for Tensix cores. See <a href="https://github.com/tenstorrent/tt-metal">tt-metal</a> for more information.

group.tt_metal.compilers=tt_metal_latest
group.tt_metal.groupName=TT-Metalium
group.tt_metal.intelAsm=-O2 -target riscv32-unknown-elf
group.tt_metal.compilerType=tt-metal

compiler.tt_metal_latest.name=TT-Metalium (latest)
compiler.tt_metal_latest.exe=/opt/compiler-explorer/tt-metal/bin/clang++
compiler.tt_metal_latest.options=-O2 -target riscv32-unknown-elf -S
compiler.tt_metal_latest.semver=(trunk)
compiler.tt_metal_latest.isNightly=true
